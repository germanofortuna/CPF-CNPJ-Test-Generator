<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>CPF/CNPJ Tester</title>

  <style>
    body {
      width: 360px;
      font-family: Arial, sans-serif;
      padding: 12px;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 12px;
    }

    .current-site {
      font-size: 12px;
      background: #f4f4f4;
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 10px;
      word-break: break-all;
    }

    button {
      cursor: pointer;
      border: 0;
      border-radius: 6px;
      padding: 8px 10px;
      margin-top: 6px;
    }

    .primary {
      background: #2563eb;
      color: white;
      width: 100%;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 10px 0 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 12px;
      word-break: break-all;
    }

    .remove {
      background: #fee2e2;
      color: #991b1b;
      flex-shrink: 0;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #374151;
    }

    .hint {
      font-size: 11px;
      color: #6b7280;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div id="siteState" class="status"></div>
  <h1>CPF/CNPJ Test Generator</h1>

  <div class="current-site" id="currentSite">
    Carregando site atual...
  </div>

  <button id="enableCurrentSite" class="primary">
    Habilitar neste site
  </button>

  <hr />

  <label for="manualSite">Adicionar site manualmente:</label>
  <input
    id="manualSite"
    type="text"
    placeholder="https://www.google.com.br/*"
  />

  <button id="addManualSite" class="secondary">
    Adicionar
  </button>

  <div class="hint">
    Exemplos aceitos:<br />
    https://google.com.br/*<br />
    https://*.google.com.br/*
  </div>

  <hr />

  <strong>Sites habilitados:</strong>
  <ul id="sitesList"></ul>

  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
